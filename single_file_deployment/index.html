<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilingo - Syllabic Learning Suite</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Hide scrollbars globally */
        html, body {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        .custom-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-[#0a0a0c] text-[#e2e2e7] font-sans selection:bg-indigo-500/30 min-h-screen flex flex-col">
    <div id="root"></div>

    <!-- Import Map for Modules -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "lucide-react": "https://esm.sh/lucide-react@0.453.0",
        "motion": "https://esm.sh/motion/react@12.4.7",
        "@google/genai": "https://esm.sh/@google/genai@1.29.0"
      }
    }
    </script>

    <script type="module">
        import React, { useState, useCallback, useEffect } from 'react';
        import ReactDOM from 'react-dom';
        import { GoogleGenAI, Type } from '@google/genai';
        import { 
            Search, Volume2, Languages, Book, Info, Loader2, 
            ExternalLink, GraduationCap, Play, Youtube 
        } from 'lucide-react';
        import { motion, AnimatePresence } from 'motion';

        // --- CONFIGURATION ---
        // REPLACE THIS WITH YOUR GEMINI API KEY FOR GITHUB PAGES DEPLOYMENT
        const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE";
        // ---------------------

        const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });

        const speak = (text, lang) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (lang === 'en') utterance.lang = 'en-US';
            else if (lang === 'ta') utterance.lang = 'ta-IN';
            else if (lang === 'si') utterance.lang = 'si-LK';
            window.speechSynthesis.speak(utterance);
        };

        const getTranslations = async (input) => {
            if (GEMINI_API_KEY === "YOUR_GEMINI_API_KEY_HERE") {
                throw new Error("Please set your GEMINI_API_KEY in the source code to use this app on GitHub Pages.");
            }

            const response = await ai.models.generateContent({
                model: "gemini-3-flash-preview",
                contents: `Translate and provide grammatically correct versions for the following input in English, Tamil, and Sinhala. 
                1. Provide the translation for all three languages.
                2. For English: Provide the pronunciation broken down into syllables using English letters (e.g., for 'Education', show 'ed-ju-kay-shun').
                3. For Tamil and Sinhala: Provide clear phonetic pronunciation in English letters.
                4. If the input is a single word, provide dictionary meanings for the English version.
                5. Provide exactly 5 real-world example sentences. For each example, provide the translation and pronunciation (syllable-based for English, phonetic for others) in all three languages.
                
                Input: "${input}"`,
                config: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: Type.OBJECT,
                        properties: {
                            english: {
                                type: Type.OBJECT,
                                properties: {
                                    text: { type: Type.STRING },
                                    pronunciation: { type: Type.STRING },
                                    grammarNote: { type: Type.STRING },
                                    meanings: { type: Type.ARRAY, items: { type: Type.STRING } }
                                },
                                required: ["text", "pronunciation"]
                            },
                            tamil: {
                                type: Type.OBJECT,
                                properties: { text: { type: Type.STRING }, pronunciation: { type: Type.STRING } },
                                required: ["text", "pronunciation"]
                            },
                            sinhala: {
                                type: Type.OBJECT,
                                properties: { text: { type: Type.STRING }, pronunciation: { type: Type.STRING } },
                                required: ["text", "pronunciation"]
                            },
                            examples: {
                                type: Type.ARRAY,
                                minItems: 5,
                                maxItems: 5,
                                items: {
                                    type: Type.OBJECT,
                                    properties: {
                                        english: { type: Type.OBJECT, properties: { text: { type: Type.STRING }, pronunciation: { type: Type.STRING } }, required: ["text", "pronunciation"] },
                                        tamil: { type: Type.OBJECT, properties: { text: { type: Type.STRING }, pronunciation: { type: Type.STRING } }, required: ["text", "pronunciation"] },
                                        sinhala: { type: Type.OBJECT, properties: { text: { type: Type.STRING }, pronunciation: { type: Type.STRING } }, required: ["text", "pronunciation"] }
                                    },
                                    required: ["english", "tamil", "sinhala"]
                                }
                            }
                        },
                        required: ["english", "tamil", "sinhala", "examples"]
                    }
                },
            });

            try {
                return JSON.parse(response.text || '{}');
            } catch (error) {
                console.error("Failed to parse Gemini response:", error);
                throw new Error("Failed to process your request. Please try again.");
            }
        };

        function ExampleColumn({ title, icon, examples, accentColor, lang }) {
            return React.createElement('div', { className: "flex flex-col gap-4" },
                React.createElement('div', { className: "flex items-center gap-3 px-2" },
                    React.createElement('div', { className: `w-8 h-8 rounded-lg flex items-center justify-center bg-[#16161a] border ${accentColor} text-xs` }, icon),
                    React.createElement('h4', { className: "text-[10px] font-bold text-neutral-500 uppercase tracking-widest" }, title)
                ),
                React.createElement('div', { className: "space-y-4" },
                    examples.map((ex, i) => 
                        React.createElement('div', { key: i, className: "p-5 bg-[#16161a] border border-[#232328] rounded-2xl hover:border-indigo-500/20 transition-colors group relative" },
                            React.createElement('button', {
                                onClick: () => speak(ex.text, lang),
                                className: "absolute top-4 right-4 p-2 rounded-full bg-white/5 opacity-0 group-hover:opacity-100 hover:bg-white/10 transition-all"
                            }, React.createElement(Volume2, { size: 12, className: "text-indigo-400" })),
                            React.createElement('p', { className: "text-sm text-neutral-200 leading-relaxed font-medium group-hover:text-white transition-colors pr-8" }, ex.text),
                            React.createElement('div', { className: `mt-3 flex items-center gap-2 text-[10px] font-mono font-bold italic tracking-tight ${lang === 'en' ? 'text-indigo-400/90' : 'text-neutral-500'}` },
                                React.createElement('div', { className: "w-1 h-1 rounded-full bg-current opacity-30" }),
                                ex.pronunciation
                            )
                        )
                    )
                )
            );
        }

        function LanguageCard({ title, data, accent = 'neutral', onWatch }) {
            const lang = title.toLowerCase().includes('english') ? 'en' : title.toLowerCase().includes('tamil') ? 'ta' : 'si';
            
            return React.createElement(motion.div, {
                initial: { opacity: 0, scale: 0.98 },
                animate: { opacity: 1, scale: 1 },
                className: "bg-[#16161a] border border-[#232328] rounded-2xl p-7 flex flex-col justify-between shadow-sm hover:border-indigo-500/30 transition-all hover:bg-[#1b1b21] relative group"
            }, 
                React.createElement('div', null,
                    React.createElement('div', { className: "flex items-center justify-between mb-6" },
                        React.createElement('span', { className: "text-[10px] font-bold text-neutral-500 uppercase tracking-[0.2em]" }, title),
                        accent === 'indigo' && React.createElement('span', { className: "px-2 py-0.5 bg-neutral-800 rounded text-[9px] text-neutral-400 font-mono tracking-tighter uppercase opacity-60" }, "Syllable Mode")
                    ),
                    React.createElement('h2', { className: `text-2xl font-semibold leading-relaxed ${accent === 'indigo' ? 'text-white' : 'text-indigo-100'}` }, data.text),
                    React.createElement('div', { className: `mt-4 py-2 px-3 rounded-lg flex items-center gap-3 text-xs font-mono font-bold italic tracking-tight border-l-2 transition-colors ${accent === 'indigo' ? 'bg-indigo-500/10 text-indigo-400 border-indigo-500' : 'bg-neutral-800/40 text-neutral-500 border-neutral-700'}` },
                        React.createElement(Volume2, { size: 16, className: "opacity-40" }),
                        data.pronunciation
                    )
                ),
                React.createElement('div', { className: "mt-8 pt-6 flex flex-col gap-3" },
                    React.createElement('button', {
                        onClick: () => speak(data.text, lang),
                        className: "w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl flex items-center justify-center gap-2 text-[10px] font-bold uppercase tracking-widest text-[#e2e2e7] transition-all"
                    }, React.createElement(Play, { size: 14, className: "fill-current" }), "Listen Native Audio"),
                    onWatch && React.createElement('button', {
                        onClick: onWatch,
                        className: "flex items-center justify-center gap-2 text-[9px] font-bold uppercase tracking-widest text-neutral-600 hover:text-red-500 transition-colors"
                    }, React.createElement(Youtube, { size: 12 }), "Watch on YouGlish")
                )
            );
        }

        function App() {
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            const handleSearch = useCallback(async () => {
                if (!input.trim()) return;
                setLoading(true);
                setError(null);
                try {
                    const data = await getTranslations(input);
                    setResult(data);
                } catch (err) {
                    setError(err.message || 'Something went wrong.');
                } finally {
                    setLoading(false);
                }
            }, [input]);

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSearch();
                }
            };

            const openYouGlish = (text) => {
                window.open(`https://youglish.com/pronounce/${encodeURIComponent(text)}/english`, '_blank');
            };

            return React.createElement('div', { className: "min-h-screen bg-[#0a0a0c] text-[#e2e2e7] font-sans flex flex-col" },
                React.createElement('header', { className: "border-b border-[#232328] bg-[#0a0a0c]/80 backdrop-blur-md sticky top-0 z-50" },
                    React.createElement('div', { className: "max-w-5xl mx-auto px-6 py-4 flex items-center justify-between" },
                        React.createElement('div', { className: "flex items-center gap-3" },
                            React.createElement('div', { className: "w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20" },
                                React.createElement(Languages, { size: 22, className: "text-white" })
                            ),
                            React.createElement('div', null,
                                React.createElement('h1', { className: "text-xl font-semibold tracking-tight" }, "Trilingo"),
                                React.createElement('p', { className: "text-[10px] text-neutral-500 font-medium uppercase tracking-[0.2em]" }, "Syllabic Learning Suite")
                            )
                        ),
                        React.createElement('nav', { className: "hidden md:flex gap-6 text-sm font-medium text-neutral-400" },
                            React.createElement('a', { href: "#", className: "text-indigo-400 border-b border-indigo-400 pb-1" }, "Portable Version"),
                            React.createElement('a', { href: "#", className: "hover:text-white transition-colors text-[10px] uppercase tracking-widest" }, "v1.5.0 STABLE")
                        )
                    )
                ),
                React.createElement('main', { className: "max-w-5xl mx-auto px-6 py-12 flex-1" },
                    React.createElement('section', { className: "mb-12" },
                        React.createElement('div', { className: "relative group" },
                            React.createElement('textarea', {
                                value: input,
                                onChange: (e) => setInput(e.target.value),
                                onKeyDown: handleKeyPress,
                                placeholder: "Enter word or phrase to translate...",
                                className: "w-full h-32 p-6 rounded-2xl bg-[#16161a] border border-[#232328] text-[#e2e2e7] text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder-neutral-600 shadow-xl resize-none font-medium"
                            }),
                            React.createElement('div', { className: "absolute bottom-4 right-4 flex gap-2" },
                                React.createElement('button', {
                                    onClick: handleSearch,
                                    disabled: loading || !input.trim(),
                                    className: "px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-semibold shadow-lg shadow-indigo-600/30 disabled:opacity-50 disabled:scale-100 transition-all flex items-center gap-2 group"
                                }, 
                                    loading ? React.createElement(Loader2, { className: "animate-spin", size: 18 }) : React.createElement(Search, { size: 18, className: "group-hover:scale-110 transition-transform" }),
                                    loading ? 'Processing...' : 'Translate'
                                )
                            )
                        ),
                        React.createElement('p', { className: "mt-4 text-xs text-neutral-500 uppercase tracking-widest font-semibold flex items-center gap-2 opacity-60" },
                            React.createElement(Info, { size: 12 }), "Tip: Press Enter for Syllable breakdown and Native TTS"
                        ),
                        GEMINI_API_KEY === "YOUR_GEMINI_API_KEY_HERE" && React.createElement('div', { className: "mt-4 p-4 bg-yellow-900/20 text-yellow-500 rounded-xl text-xs font-bold border border-yellow-900/30" }, "⚠️ IMPORTANT: Replace 'YOUR_GEMINI_API_KEY_HERE' in the source code to enable translation functionality on GitHub Pages.")
                    ),
                    React.createElement(AnimatePresence, { mode: "wait" },
                        error && React.createElement(motion.div, {
                            initial: { opacity: 0, y: 10 },
                            animate: { opacity: 1, y: 0 },
                            className: "p-4 bg-red-900/20 text-red-400 rounded-2xl text-center font-medium border border-red-900/30 mb-8"
                        }, error),
                        result && React.createElement('div', { className: "flex flex-col gap-12" },
                            React.createElement(motion.div, { initial: { opacity: 0 }, animate: { opacity: 1 }, className: "grid grid-cols-1 md:grid-cols-3 gap-6" },
                                React.createElement(LanguageCard, { title: "English", langCode: "en", data: result.english, accent: "indigo", onWatch: () => openYouGlish(result.english.text) }),
                                React.createElement(LanguageCard, { title: "Tamil | தமிழ்", langCode: "ta", data: result.tamil }),
                                React.createElement(LanguageCard, { title: "Sinhala | සිංහල", langCode: "si", data: result.sinhala })
                            ),
                            React.createElement('div', { className: "flex flex-col gap-12" },
                                React.createElement('div', { className: "bg-[#16161a] border border-[#232328] rounded-2xl overflow-hidden flex flex-col shadow-sm" },
                                    React.createElement('div', { className: "px-6 py-4 border-b border-[#232328] bg-[#1b1b21]/50 flex items-center gap-3" },
                                        React.createElement('span', { className: "w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]" }),
                                        React.createElement('h3', { className: "text-[10px] font-bold text-neutral-400 uppercase tracking-[0.2em]" }, "Contextual Meanings & Dictionary Analysis")
                                    ),
                                    React.createElement('div', { className: "p-8" },
                                        result.english.meanings && result.english.meanings.length > 0 ? 
                                            React.createElement('div', { className: "space-y-6" }, result.english.meanings.map((meaning, idx) => 
                                                React.createElement('div', { key: idx, className: "flex gap-6" },
                                                    React.createElement('span', { className: "text-neutral-600 font-black text-sm pt-1" }, `0${idx + 1}`),
                                                    React.createElement('p', { className: "text-lg leading-relaxed font-serif italic text-neutral-300" }, `"${meaning}"`)
                                                )
                                            )) : React.createElement('div', { className: "flex flex-col items-center justify-center py-12 text-neutral-600 gap-4 text-center" }, 
                                                React.createElement(Book, { size: 48, strokeWidth: 1 }),
                                                React.createElement('p', { className: "text-xs uppercase tracking-[0.3em] font-bold opacity-40" }, "Definitions appear for specific words")
                                            ),
                                            result.english.grammarNote && React.createElement('div', { className: "mt-8 pt-8 border-t border-[#232328] flex gap-4" },
                                                React.createElement(Info, { size: 18, className: "text-indigo-400 shrink-0 mt-0.5" }),
                                                React.createElement('div', null,
                                                    React.createElement('h4', { className: "text-xs font-bold text-neutral-500 uppercase tracking-widest mb-1" }, "Instructional Note"),
                                                    React.createElement('p', { className: "text-sm text-neutral-400 leading-relaxed italic" }, result.english.grammarNote)
                                                )
                                            )
                                    )
                                ),
                                React.createElement(motion.div, {
                                    initial: { opacity: 0, y: 20 },
                                    animate: { opacity: 1, y: 0 },
                                    className: "bg-[#16161a] border border-[#232328] rounded-2xl p-8 flex flex-col items-center text-center bg-gradient-to-br from-indigo-900/10 to-transparent"
                                },
                                    React.createElement('div', { className: "w-16 h-16 rounded-full bg-[#ff0000] shadow-xl shadow-red-600/20 flex items-center justify-center mb-6" }, React.createElement(Youtube, { className: "text-white", size: 24 })),
                                    React.createElement('h3', { className: "text-xl font-semibold mb-2 font-serif italic" }, "Watch Pronunciation"),
                                    React.createElement('p', { className: "text-xs text-neutral-400 mb-8 max-w-sm" }, `View native speakers pronouncing "${result.english.text}" on YouGlish.`),
                                    React.createElement('button', { onClick: () => openYouGlish(result.english.text), className: "px-8 py-4 bg-white text-black text-[10px] font-bold uppercase tracking-[0.2em] rounded-xl flex items-center gap-2" }, "Watch on YouGlish", React.createElement(ExternalLink, { size: 14 }))
                                ),
                                React.createElement('section', null,
                                    React.createElement('div', { className: "flex items-center gap-4 mb-8" },
                                        React.createElement('div', { className: "h-px flex-1 bg-[#232328]" }),
                                        React.createElement('h3', { className: "text-[10px] font-bold text-neutral-500 uppercase tracking-[0.3em] flex items-center gap-2" }, React.createElement(GraduationCap, { size: 14, className: "text-indigo-400" }), "Interactive Usage"),
                                        React.createElement('div', { className: "h-px flex-1 bg-[#232328]" })
                                    ),
                                    React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-3 gap-6" },
                                        React.createElement(ExampleColumn, { title: "English Context", icon: "EN", examples: result.examples.map(ex => ex.english), accentColor: "border-indigo-500/20", lang: "en" }),
                                        React.createElement(ExampleColumn, { title: "Tamil Context", icon: "TA", examples: result.examples.map(ex => ex.tamil), accentColor: "border-orange-500/20", lang: "ta" }),
                                        React.createElement(ExampleColumn, { title: "Sinhala Context", icon: "SI", examples: result.examples.map(ex => ex.sinhala), accentColor: "border-emerald-500/20", lang: "si" })
                                    )
                                )
                            )
                        )
                    )
                ),
                React.createElement('footer', { className: "mt-auto border-t border-white/5 bg-[#0a0a0c]/90 backdrop-blur-xl sticky bottom-0 z-40" },
                    React.createElement('div', { className: "max-w-5xl mx-auto px-8 py-6" },
                        React.createElement('div', { className: "flex flex-col md:flex-row justify-between items-center gap-6" },
                            React.createElement('div', { className: "flex flex-col md:flex-row items-center gap-4 text-center md:text-left" },
                                React.createElement('div', { className: "flex items-center gap-2" },
                                    React.createElement('span', { className: "text-[10px] font-black text-neutral-500 uppercase tracking-[0.2em]" }, "Developer:"),
                                    React.createElement('span', { className: "text-sm font-semibold text-white" }, "Shehan Thilakarathna")
                                ),
                                React.createElement('span', { className: "hidden md:inline text-neutral-800" }, "|"),
                                React.createElement('div', { className: "flex items-center gap-4" },
                                    React.createElement('a', { href: "mailto:sthilakarathna@gmail.com", className: "text-[10px] font-bold text-indigo-400 hover:text-indigo-300 transition-colors uppercase tracking-widest border-b border-transparent hover:border-indigo-400 pb-0.5" }, "Email Developer"),
                                    React.createElement('a', { href: "https://wa.me/94779012471", target: "_blank", rel: "noopener noreferrer", className: "text-[10px] font-bold text-emerald-400 hover:text-emerald-300 transition-colors uppercase tracking-widest border-b border-transparent hover:border-emerald-400 pb-0.5" }, "Connect on WhatsApp")
                                )
                            ),
                            React.createElement('div', { className: "flex items-center gap-4 text-right" },
                                React.createElement('div', { className: "hidden md:flex flex-col items-end" },
                                    React.createElement('span', { className: "text-[9px] text-neutral-600 uppercase tracking-widest font-black leading-none mb-1" }, "sthilakarathna@gmail.com"),
                                    React.createElement('span', { className: "text-[9px] text-neutral-600 uppercase tracking-widest font-black leading-none" }, "WhatsApp: 0779012471")
                                )
                            )
                        )
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
